services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app/backend
      - ./database:/app/database
      - /etc/letsencrypt:/etc/letsencrypt:ro
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_URL=https://bibliotecamoleculares.com
      - DEBUG=True
      - DATABASE_URL=sqlite:///app/database/library.db
      - NODE_EXTRA_CA_CERTS=/etc/ssl/certs/ca-certificates.crt
      - NODE_OPTIONS=--use-openssl-ca
    entrypoint: ["/bin/sh", "-c", "mkdir -p /app/database && node src/database/initDb.js && node src/main.js"]

  cron:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c", "apt-get update && apt-get install -y tzdata && ln -snf /usr/share/zoneinfo/$${TZ} /etc/localtime && echo $${TZ} > /etc/timezone && sleep 30 && while true; do node scripts/checkOverdues.js; sleep 86400; done"]
    volumes:
      - ./database:/app/database
    environment:
      - DATABASE_URL=sqlite:///app/database/library.db
      - SQLITE_BUSY_TIMEOUT=30000
      - TZ=America/Sao_Paulo
    depends_on:
      - backend

  backup:
    image: ubuntu:latest
    volumes:
      - ./database:/app/database
      - ./scripts:/app/scripts
    environment:
      - GDRIVE_FOLDER_ID=1eCEzS0-vCnmKxin4MUpqDj-QWA28klit
      - TZ=America/Sao_Paulo
    entrypoint: ["/bin/sh", "-c", "apt-get update && apt-get install -y wget curl tzdata rclone jq && ln -snf /usr/share/zoneinfo/$${TZ} /etc/localtime && echo $${TZ} > /etc/timezone && while true; do bash /app/scripts/backup_db_to_gdrive.sh; sleep 86400; done"]
    depends_on:
      - backend

  # Scraping semanal de disciplinas da USP (roda todo domingo às 3h)
  scrape-disciplines:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c", "apt-get update && apt-get install -y tzdata && ln -snf /usr/share/zoneinfo/$${TZ} /etc/localtime && echo $${TZ} > /etc/timezone && sleep 60 && while true; do echo \"[$(date)] Iniciando scraping de disciplinas USP...\"; node scripts/scrapeUSPDisciplines.js; echo \"[$(date)] Scraping concluído. Próximo em 7 dias.\"; sleep 604800; done"]
    volumes:
      - ./database:/app/database
    environment:
      - DATABASE_URL=sqlite:///app/database/library.db
      - SQLITE_BUSY_TIMEOUT=30000
      - TZ=America/Sao_Paulo
    depends_on:
      - backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biblioteca-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend

  # Renovação automática de certificados Let's Encrypt
  # - Tenta renovar a cada 12 horas (padrão recomendado pelo LE)
  # - Usa webroot challenge (Nginx serve /.well-known/acme-challenge/)
  # - Não precisa parar o Nginx para renovar
  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
      - ./scripts/certbot-entrypoint.sh:/certbot-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/certbot-entrypoint.sh"]
    depends_on:
      - frontend

volumes:
  certbot-webroot:
